name: Feature Request
description: Suggest a new feature or improvement for avio-editor-demo
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please provide enough information to help evaluate and prioritize it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the feature in 1-2 sentences.
      placeholder: Add a volume slider to the Source Monitor controls to adjust audio playback level.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Who benefits from it?
      placeholder: |
        When reviewing clips with very loud audio, there is no way to lower the volume
        during playback without changing system volume. An in-app volume control would
        make clip review more comfortable.
    validations:
      required: true

  - type: textarea
    id: detailed_description
    attributes:
      label: Detailed Description
      description: Describe the desired behavior, UI shape, and any edge cases to consider.
      placeholder: |
        A volume slider (0–100%) in the Source Monitor controls row:
        - Persists across clip loads within a session
        - Calls the appropriate avio playback API to adjust gain
        - Defaults to 100% on launch

        ```rust
        if let Some(player) = &mut state.player {
            player.set_volume(state.volume)?;
        }
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you tried or considered?
      placeholder: |
        - Adjusting system volume: works but affects all apps
        - Using a filter graph for gain: possible but heavyweight for a simple slider

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to related issues, avio API docs, or prior art.
      placeholder: |
        - Related issue: #5
        - avio PreviewPlayer API: ...

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would improve my workflow
        - High - Blocking my use case
      default: 0
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the app does this feature belong to?
      options:
        - Clip Browser
        - Source Monitor
        - Timeline
        - Export
        - Other / Multiple
      default: 4

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement this feature
          required: false
        - label: I can provide test cases or sample media files
          required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have checked the tracking issue (#33) to see if this is already planned
          required: false
        - label: This feature fits within the demo's MVP scope (validate avio API, not build a production editor)
          required: false
